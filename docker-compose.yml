version: "3.9"

services:
  api:
    build: .
    container_name: financial-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - chroma_data:/app/chroma_db
      - sqlite_data:/app/database.db
    environment:
      - PYTHONUNBUFFERED=1
      - OLLAMA_URL=http://ollama:11434/api/generate
    env_file:
      - .env
    depends_on:
      ollama:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: financial-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  chroma_data:
  sqlite_data:
  ollama_data:

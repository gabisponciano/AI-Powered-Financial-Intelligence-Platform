services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: financial-api
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - chroma_data:/app/chroma_db
      - ./backend/database.db:/app/database.db
    environment:
      - PYTHONUNBUFFERED=1
      - OLLAMA_URL=http://ollama:11434/api/generate
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=mistral
      - OLLAMA_EMBED_MODEL=nomic-embed-text
    depends_on:
      ollama:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: financial-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:${API_PORT:-8000}
    depends_on:
      - api

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      # The base image may not include curl/wget. Use the ollama CLI itself.
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  chroma_data:
  ollama_data:
